apiVersion: apps/v1
kind: Deployment
metadata:
  name: harness-demo-app
  namespace: harness-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: harness-demo-app
  template:
    metadata:
      labels:
        app: harness-demo-app
    spec:
      containers:
        - name: app
          image: <+artifact.image>
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "<+pipeline.variables.appVersion>"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
