pipeline:
  name: demo-ci
  identifier: demo_ci
  projectIdentifier: Test_CI_CD_STO
  orgIdentifier: Animesh_Org
  variables:
    - name: dockerImage
      type: String
      value: animeshsri98/harness-demo-app
    - name: severityThreshold
      type: String
      value: critical
  properties:
    ci:
      codebase:
        connectorRef: github_connector
        repoName: harness-demo-app
        build: <+input>
  stages:
    - stage:
        name: build_test_scan
        identifier: build_test_scan
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Install_and_Test
                  identifier: install_and_test
                  spec:
                    shell: Sh
                    command: |-
                      pip install --upgrade pip
                      pip install --ignore-installed -r requirements-dev.txt
                      pytest
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - test-results/junit.xml
              - step:
                  type: Run
                  name: Build_Wheel
                  identifier: build_wheel
                  spec:
                    shell: Sh
                    command: |-
                      pip install --ignore-installed wheel setuptools
                      python setup.py bdist_wheel
                      ls -lh dist/
              - step:
                  type: Gitleaks
                  name: Secret_Scan
                  identifier: secret_scan
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      name: harness-demo-app
                      type: repository
                      variant: <+codebase.branch>
                    advanced:
                      log:
                        level: info
                      fail_on_severity: critical
              - step:
                  type: Semgrep
                  name: SAST_Scan
                  identifier: sast_scan
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      name: harness-demo-app
                      type: repository
                      variant: <+codebase.branch>
                    advanced:
                      fail_on_severity: <+pipeline.variables.severityThreshold>
              - step:
                  type: AquaTrivy
                  name: Dependency_Scan
                  identifier: dependency_scan
                  spec:
                    mode: orchestration
                    config: fs
                    target:
                      name: harness-demo-app
                      type: repository
                      variant: <+codebase.branch>
                    advanced:
                      fail_on_severity: critical
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build_Push_Image
                  identifier: build_push_image
                  spec:
                    connectorRef: dockerhub_connector
                    repo: <+pipeline.variables.dockerImage>
                    tags:
                      - 1.0.<+pipeline.sequenceId>
              - step:
                  type: AquaTrivy
                  name: Image_Scan
                  identifier: image_scan
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      name: harness-demo-app-image
                      type: container
                      variant: 1.0.<+pipeline.sequenceId>
                    image:
                      type: docker_v2
                      name: <+pipeline.variables.dockerImage>
                      tag: 1.0.<+pipeline.sequenceId>
                      connector_ref: dockerhub_connector
                    advanced:
                      fail_on_severity: critical
